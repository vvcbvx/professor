<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لوحة الأستاذ - نظام إدارة المدرسة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* ===== إعادة تعيين ===== */
        .sidebar, .sidebar-overlay, .menu-toggle, .top-nav {
            display: none !important;
        }
        
        .main-content {
            margin: 0 !important;
            padding: 16px 16px 90px !important;
            width: 100% !important;
        }

        /* ===== شريط التنقل السفلي ===== */
        .bottom-nav {
            display: flex !important;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            border-top: 1px solid #e8ecf1;
            padding: 6px 0 env(safe-area-inset-bottom, 8px);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }

        .bottom-nav .nav-items {
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 100%;
            max-width: 350px;
            margin: 0 auto;
        }

        .bottom-nav .nav-item-bottom {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 6px 8px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            color: #8a9bae;
            transition: all 0.25s ease;
            position: relative;
            min-width: 50px;
            border-radius: 12px;
            flex: 1;
        }

        .bottom-nav .nav-item-bottom i {
            font-size: 22px;
            transition: all 0.25s ease;
        }

        .bottom-nav .nav-item-bottom span {
            font-size: 10px;
            font-weight: 600;
            transition: all 0.25s ease;
        }

        .bottom-nav .nav-item-bottom.active {
            color: #4a6cf7;
        }

        .bottom-nav .nav-item-bottom.active::before {
            content: '';
            position: absolute;
            top: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 3px;
            background: #4a6cf7;
            border-radius: 0 0 4px 4px;
        }

        /* ===== بطاقات الصفوف ===== */
        .classes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            margin-top: 8px;
        }

        .class-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            border: 2px solid #eef2f7;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .class-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            border-color: #d0d7e0;
        }

        .class-card.active {
            border-color: #4a6cf7;
            background: #f8faff;
            box-shadow: 0 4px 20px rgba(74,108,247,0.12);
        }

        .class-card .class-card-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 12px;
        }

        .class-card .class-card-icon {
            width: 48px;
            height: 48px;
            background: #e8edff;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #4a6cf7;
            flex-shrink: 0;
        }

        .class-card .class-card-info {
            flex: 1;
        }

        .class-card .class-card-info h3 {
            font-size: 16px;
            font-weight: 700;
            color: #1a2332;
            margin: 0;
        }

        .class-card .class-card-info .class-year {
            font-size: 12px;
            color: #8a9bae;
            display: block;
        }

        .class-card .class-card-badge {
            background: #f0f3f8;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: #2c3e7a;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .class-card .class-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid #f0f2f5;
        }

        .class-card .students-label {
            font-size: 13px;
            color: #8a9bae;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .class-card .view-details-btn {
            font-size: 13px;
            font-weight: 600;
            color: #4a6cf7;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* ===== تفاصيل الصف ===== */
        .class-details-section {
            display: none;
            animation: fadeSlideIn 0.4s ease;
        }

        .class-details-section.show {
            display: block;
        }

        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .back-to-classes-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #f0f3f8;
            border: none;
            border-radius: 10px;
            font-family: 'Cairo', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: #2c3e7a;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-bottom: 16px;
        }

        .back-to-classes-btn:hover {
            background: #e4e9f0;
        }

        /* ===== تحسينات عامة ===== */
        .content-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            margin-bottom: 16px;
            border: 1px solid #eef2f7;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f0f3f8;
            flex-wrap: wrap;
            gap: 8px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 700;
            color: #1a2332;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-title i { color: #4a6cf7; }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #e8ecf1;
            flex-wrap: wrap;
            gap: 10px;
        }

        .page-header h2 {
            font-size: 20px;
            color: #1a2332;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0;
        }
        .page-header h2 i { color: #4a6cf7; }

        .page-header .role-badge {
            padding: 4px 14px;
            background: #e8ecf1;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: #2c3e7a;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        .form-grid .full-width { grid-column: 1 / -1; }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #2c3e7a;
            margin-bottom: 4px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e8ecf1;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.25s ease;
            background: #fafcff;
            color: #1a2332;
            font-family: 'Cairo', sans-serif;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #4a6cf7;
            box-shadow: 0 0 0 4px rgba(74,108,247,0.08);
            background: white;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: 'Cairo', sans-serif;
            width: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #1a2332, #2c3e7a);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(26,35,50,0.25); }

        .btn-success {
            background: linear-gradient(135deg, #059669, #10b981);
            color: white;
        }
        .btn-success:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(16,185,129,0.3); }

        .btn-danger {
            background: linear-gradient(135deg, #dc2626, #ef4444);
            color: white;
        }
        .btn-danger:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(239,68,68,0.3); }

        .btn-warning {
            background: linear-gradient(135deg, #d97706, #f59e0b);
            color: white;
        }
        .btn-warning:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(245,158,11,0.3); }

        .btn-sm {
            padding: 4px 12px;
            font-size: 12px;
            border-radius: 8px;
            width: auto;
        }

        .table-wrapper { overflow-x: auto; }
        .table-wrapper table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 400px;
        }
        .table-wrapper table thead { background: #f8fafc; }
        .table-wrapper table th {
            padding: 10px 12px;
            text-align: right;
            font-weight: 600;
            color: #2c3e7a;
            border-bottom: 2px solid #e4e9f0;
            white-space: nowrap;
        }
        .table-wrapper table td {
            padding: 10px 12px;
            border-bottom: 1px solid #eef2f7;
            color: #1a2332;
            vertical-align: middle;
        }
        .table-wrapper table tbody tr:hover { background: #f8fafc; }

        .empty-state {
            text-align: center;
            padding: 32px 16px;
        }
        .empty-state i {
            font-size: 40px;
            color: #d0d7e0;
            margin-bottom: 8px;
            display: block;
        }
        .empty-state p { color: #8a9bae; font-size: 14px; }

        .loading-spinner {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            gap: 10px;
            color: #8a9bae;
        }
        .loading-spinner i {
            font-size: 24px;
            color: #4a6cf7;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .profile-avatar-upload {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .profile-avatar-upload .avatar-preview {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #e8ecf1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #8a9bae;
            overflow: hidden;
            flex-shrink: 0;
            border: 3px solid #e8ecf1;
        }
        .profile-avatar-upload .avatar-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .profile-avatar-upload .upload-actions label {
            padding: 6px 16px;
            background: #f0f3f8;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: #1a2332;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .profile-avatar-upload .upload-actions label:hover { background: #e4e9f0; }
        .profile-avatar-upload .upload-actions input[type="file"] { display: none; }

        /* ===== بطاقات الامتحانات المصغرة ===== */
        .exam-mini-card {
            background: #f8fafc;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 8px;
            border: 1px solid #eef2f7;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .exam-mini-card .exam-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .exam-mini-card .exam-status-badge {
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .exam-mini-card .exam-status-badge.upcoming {
            background: #fef3c7;
            color: #92400e;
        }

        .exam-mini-card .exam-status-badge.ongoing {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .exam-mini-card .exam-status-badge.completed {
            background: #d1fae5;
            color: #065f46;
        }

        .exam-mini-card .exam-actions {
            display: flex;
            gap: 6px;
        }

        .exam-mini-card .exam-actions .btn-sm {
            padding: 2px 10px;
            font-size: 11px;
        }

        /* ===== نموذج إضافة الامتحان داخل التفاصيل ===== */
        .add-exam-form-container {
            background: #f8fafc;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            border: 2px dashed #d0d7e0;
            display: none;
        }

        .add-exam-form-container.show {
            display: block;
            animation: fadeSlideIn 0.3s ease;
        }

        /* ===== أيام الأسبوع ===== */
        .day-option {
            padding: 8px;
            border-radius: 10px;
            border: 2px solid #e8ecf1;
            background: white;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .day-option:hover:not(.past) {
            border-color: #4a6cf7;
            transform: scale(1.05);
        }

        .day-option.past {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .day-option.selected {
            border-color: #4a6cf7;
            background: #e8edff;
        }

        /* ===== تحسينات للشاشات الصغيرة ===== */
        @media (max-width: 480px) {
            .bottom-nav .nav-item-bottom i {
                font-size: 18px;
            }
            .bottom-nav .nav-item-bottom span {
                font-size: 9px;
            }
            .bottom-nav .nav-item-bottom {
                padding: 4px 4px;
                min-width: 40px;
            }
            .form-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .main-content {
                padding: 12px 12px 80px !important;
            }
            .page-header h2 {
                font-size: 16px;
            }
            .classes-grid {
                grid-template-columns: 1fr;
            }
            .class-card .class-card-header {
                gap: 10px;
            }
            .class-card .class-card-icon {
                width: 40px;
                height: 40px;
                font-size: 18px;
            }
            .exam-mini-card {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
<!-- ===== شريط التنقل السفلي ===== -->
<nav class="bottom-nav" id="bottomNav">
    <div class="nav-items">
        <button class="nav-item-bottom active" data-section="classes" onclick="window.Navigation.navigateTo('classes')">
            <i class="fas fa-school"></i>
            <span>صفوفي</span>
        </button>
        <button class="nav-item-bottom" data-section="students" onclick="window.Navigation.navigateTo('students')">
            <i class="fas fa-user-graduate"></i>
            <span>طلابي</span>
        </button>
        <button class="nav-item-bottom" data-section="profile" onclick="window.Navigation.navigateTo('profile')">
            <i class="fas fa-user"></i>
            <span>حسابي</span>
        </button>
    </div>
</nav>
    <!-- ===== المحتوى الرئيسي ===== -->
    <main class="main-content">
        <!-- ===== رأس الصفحة ===== -->
        <div class="page-header">
            <div class="header-left">
                <h2 id="pageTitle"><i class="fas fa-school"></i> صفوفي</h2>
            </div>
            <div class="header-actions">
                <span class="role-badge"><i class="fas fa-chalkboard-teacher"></i> أستاذ</span>
                <button class="btn btn-danger btn-sm" onclick="window.Auth.logout()" style="width:auto;padding:4px 12px;font-size:12px;">
                    <i class="fas fa-sign-out-alt"></i> خروج
                </button>
            </div>
        </div>

        <!-- ===== صفوفي ===== -->
        <div class="content-section active" id="section-classes">
            <div class="content-card">
                <div class="card-header">
                    <div class="card-title"><i class="fas fa-school"></i> صفوفي</div>
                    <span style="font-size:12px;color:#8a9bae;" id="classesCount">0 صف</span>
                </div>
                <div id="classesContainer" class="classes-grid">
                    <div class="loading-spinner"><i class="fas fa-spinner"></i> جاري التحميل...</div>
                </div>
            </div>
        </div>

        <!-- ===== تفاصيل الصف (صفوفي + امتحانات) ===== -->
        <div class="content-section" id="section-class-details">
            <div class="content-card">
                <button class="back-to-classes-btn" onclick="window.TeacherClasses.goBack()">
                    <i class="fas fa-arrow-right"></i> العودة إلى الصفوف
                </button>
                
                <div id="classDetailsContent">
                    <div class="loading-spinner"><i class="fas fa-spinner"></i> جاري التحميل...</div>
                </div>
            </div>
        </div>
<!-- ===== طلابي ===== -->
<div class="content-section" id="section-students">
    <div class="content-card">
        <div class="card-header">
            <div class="card-title">
                <i class="fas fa-users"></i> 
                طلابي - <span id="currentClassName">اختر صفاً</span>
            </div>
            <span style="font-size:12px;color:#8a9bae;" id="studentsCount">0 طالب</span>
        </div>
        
        <!-- اختيار الصف -->
        <div style="margin-bottom:16px;">
            <label style="font-size:13px;font-weight:600;color:#2c3e7a;display:block;margin-bottom:4px;">
                <i class="fas fa-school"></i> اختر الصف
            </label>
            <select id="classSelect" style="width:100%;padding:10px 14px;border:2px solid #e8ecf1;border-radius:10px;font-size:14px;font-family:'Cairo',sans-serif;background:white;">
                <option value="">جاري التحميل...</option>
            </select>
        </div>
        
        <!-- البحث -->
        <div style="margin-bottom:12px;">
            <div class="search-box" style="display:flex;align-items:center;gap:10px;background:#fafcff;border:2px solid #e8ecf1;border-radius:10px;padding:4px 12px;">
                <i class="fas fa-search" style="color:#8a9bae;"></i>
                <input type="text" id="studentSearchInput" placeholder="ابحث باسم الطالب أو الرقم المدرسي..." 
                       style="flex:1;padding:8px 0;border:none;background:transparent;font-size:14px;font-family:'Cairo',sans-serif;color:#1a2332;"
                       oninput="window.TeacherStudents.filterStudents(this.value)">
                <button class="btn btn-sm btn-primary" onclick="document.getElementById('studentSearchInput').value='';window.TeacherStudents.filterStudents('')" style="padding:4px 12px;font-size:12px;">
                    <i class="fas fa-times"></i> مسح
                </button>
            </div>
            <div style="margin-top:6px;font-size:12px;color:#8a9bae;" id="searchResults">عرض 0 من 0 طالب</div>
        </div>
        
        <!-- جدول الطلاب -->
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>الرقم المدرسي</th>
                        <th>الاسم</th>
                        <th>ملاحظة</th>
                        <th>نسبة التفوق</th>
                        <th>نسبة التركيز</th>
                        <th>إجراء</th>
                    </tr>
                </thead>
                <tbody id="studentsTable">
                    <tr><td colspan="7"><div class="loading-spinner"><i class="fas fa-spinner"></i> جاري التحميل...</div></td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
        <!-- ===== الملف الشخصي ===== -->
        <div class="content-section" id="section-profile">
            <div class="content-card">
                <div class="card-header"><div class="card-title"><i class="fas fa-user-edit"></i> الملف الشخصي</div></div>
                <form id="profileForm" enctype="multipart/form-data">
                    <div class="profile-avatar-upload">
                        <div class="avatar-preview" id="profileAvatarPreview"><i class="fas fa-user"></i></div>
                        <div class="upload-actions">
                            <label for="profileImageInput"><i class="fas fa-camera"></i> تغيير الصورة</label>
                            <input type="file" id="profileImageInput" accept="image/*">
                        </div>

                    </div>
                    <!-- في قسم الملف الشخصي -->
<div class="content-card">
    <div class="card-header">
        <div class="card-title"><i class="fas fa-trophy"></i> مركزك في التقييم</div>
    </div>
    <div id="rankInfoContainer">
        <div class="loading-spinner"><i class="fas fa-spinner"></i> جاري التحميل...</div>
    </div>
</div>
                    <div class="form-grid">
                        <div class="form-group"><label><i class="fas fa-user"></i>الاسم الكامل</label><input type="text" id="fullName" placeholder="الاسم الكامل"></div>
                        <div class="form-group"><label><i class="fas fa-phone"></i>رقم الهاتف</label><input type="tel" id="phone" placeholder="رقم الهاتف"></div>
                        <div class="form-group full-width"><label><i class="fas fa-map-marker-alt"></i>العنوان</label><input type="text" id="address" placeholder="العنوان"></div>
                        <div class="form-group full-width"><label><i class="fas fa-info-circle"></i>نبذة</label><textarea id="bio" rows="2" placeholder="نبذة عنك"></textarea></div>
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> حفظ</button>
                </form>
            </div>
            <div class="content-card">
                <div class="card-header"><div class="card-title"><i class="fas fa-key"></i> تغيير كلمة المرور</div></div>
                <form id="passwordForm">
                    <div class="form-grid">
                        <div class="form-group"><label><i class="fas fa-lock"></i>كلمة المرور الحالية</label><input type="password" id="currentPassword" required></div>
                        <div class="form-group"><label><i class="fas fa-lock-open"></i>كلمة المرور الجديدة</label><input type="password" id="newPassword" required></div>
                    </div>
                    <button type="submit" class="btn btn-warning"><i class="fas fa-sync-alt"></i> تغيير</button>
                </form>
            </div>
        </div>
    </main>
