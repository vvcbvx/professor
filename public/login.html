<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة المدرسة - تسجيل الدخول</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #eef2f7 0%, #dce3ed 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 28px;
            padding: 48px 40px;
            max-width: 460px;
            width: 100%;
            box-shadow: 0 25px 80px rgba(0,0,0,0.08);
            position: relative;
            overflow: hidden;
        }
        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #1a2332, #4a6cf7);
        }
        .login-header { text-align: center; margin-bottom: 38px; }
        .login-header .logo {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #1a2332, #4a6cf7);
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            font-size: 32px;
            color: white;
        }
        .login-header h1 { font-size: 26px; color: #1a2332; font-weight: 800; }
        .login-header h1 span { color: #4a6cf7; }
        .login-header p { color: #7a8a9e; font-size: 15px; margin-top: 4px; }
        
        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 14px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
            text-align: center;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .error-message.show { display: flex; }
        
        .role-tabs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            background: #f0f3f8;
            padding: 6px;
            border-radius: 16px;
            margin-bottom: 32px;
        }
        .role-tab {
            padding: 12px;
            border: none;
            background: transparent;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #7a8a9e;
            transition: all 0.3s;
            font-family: 'Cairo', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .role-tab i { font-size: 18px; }
        .role-tab.active {
            background: white;
            color: #1a2332;
            box-shadow: 0 4px 16px rgba(74,108,247,0.12);
        }
        .role-tab:hover:not(.active) { color: #1a2332; }
        
        .form-group { margin-bottom: 22px; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #2c3e7a;
            margin-bottom: 6px;
        }
        .form-group .input-wrapper {
            position: relative;
        }
        .form-group .input-wrapper i {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #b0c0d0;
            font-size: 18px;
        }
        .form-group .input-wrapper input {
            width: 100%;
            padding: 14px 50px 14px 16px;
            border: 2px solid #e8ecf1;
            border-radius: 14px;
            font-size: 15px;
            transition: all 0.3s;
            background: #fafcff;
            color: #1a2332;
            font-family: 'Cairo', sans-serif;
        }
        .form-group .input-wrapper input:focus {
            outline: none;
            border-color: #4a6cf7;
            box-shadow: 0 0 0 4px rgba(74,108,247,0.08);
        }
        
        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #1a2332, #4a6cf7);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-family: 'Cairo', sans-serif;
            margin-top: 6px;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(74,108,247,0.3);
        }
        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: #8a9bae;
        }
        .login-footer strong { color: #2c3e7a; }
        .login-footer i { color: #4a6cf7; }
        
        @media (max-width: 480px) {
            .login-container { padding: 30px 20px; }
            .role-tab { font-size: 12px; padding: 10px 6px; }
            .role-tab i { font-size: 15px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo"><i class="fas fa-graduation-cap"></i></div>
            <h1>نظام <span>البروفيسور</span></h1>
            <p>تسجيل الدخول إلى لوحة التحكم</p>
        </div>

        <div class="error-message" id="errorMessage">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorText">خطأ في تسجيل الدخول</span>
        </div>

        <div class="role-tabs">
            <button class="role-tab active" data-role="student">
                <i class="fas fa-user-graduate"></i> طالب
            </button>
            <button class="role-tab" data-role="teacher">
                <i class="fas fa-chalkboard-teacher"></i> أستاذ
            </button>
            <button class="role-tab" data-role="admin">
                <i class="fas fa-user-tie"></i> مدير
            </button>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label id="usernameLabel">الرقم المدرسي</label>
                <div class="input-wrapper">
                    <input type="text" id="username" placeholder="أدخل الرقم المدرسي" required>
                    <i class="fas fa-id-card"></i>
                </div>
            </div>
            <div class="form-group">
                <label>كلمة المرور</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="أدخل كلمة المرور" required>
                    <i class="fas fa-lock"></i>
                </div>
            </div>
            <button type="submit" class="login-btn" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
            </button>
        </form>

        <div class="login-footer">
            <i class="fas fa-info-circle"></i>
            <span>تنويه : <strong> تطوير</strong> / <strong>عبد المجيد </strong></span>
        </div>
    </div>

    <script>
        // ===== منع العودة للخلف =====
        window.addEventListener('pageshow', function(event) {
            if (event.persisted) {
                window.location.reload();
            }
        });

        const roleTabs = document.querySelectorAll('.role-tab');
        const usernameInput = document.getElementById('username');
        const usernameLabel = document.getElementById('usernameLabel');
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const loginBtn = document.getElementById('loginBtn');

        let selectedRole = 'student';

        roleTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                roleTabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                selectedRole = tab.dataset.role;

                const labels = {
                    student: { label: 'الرقم المدرسي', placeholder: 'أدخل الرقم المدرسي' },
                    teacher: { label: 'الرقم الموظفي', placeholder: 'أدخل الرقم الموظفي' },
                    admin: { label: 'اسم المستخدم', placeholder: 'admin' }
                };

                usernameLabel.textContent = labels[selectedRole].label;
                usernameInput.placeholder = labels[selectedRole].placeholder;
                
                const icon = usernameInput.nextElementSibling;
                const icons = {
                    student: 'fa-id-card',
                    teacher: 'fa-id-badge',
                    admin: 'fa-user-shield'
                };
                icon.className = `fas ${icons[selectedRole]}`;
            });
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.classList.remove('show');

            const username = usernameInput.value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                showError('يرجى ملء جميع الحقول');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري تسجيل الدخول...';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username, password, role: selectedRole })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.replace(data.redirect || '/pages/student.html');
                } else {
                    showError(data.error || 'بيانات الدخول غير صحيحة');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> تسجيل الدخول';
                }
            } catch (error) {
                showError('حدث خطأ في الاتصال بالسيرفر');
                console.error('Login error:', error);
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> تسجيل الدخول';
            }
        });

        function showError(message) {
            errorText.textContent = message;
            errorMessage.classList.add('show');
            setTimeout(() => errorMessage.classList.remove('show'), 5000);
        }

        // ===== التحقق من الجلسة =====
        async function checkSession() {
            try {
                const response = await fetch('/api/current-user', {
                    credentials: 'include',
                    headers: { 'Cache-Control': 'no-cache' }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.user) {
                        localStorage.setItem('user', JSON.stringify(data.user));
                        const rolePages = {
                            admin: '/pages/admin.html',
                            teacher: '/pages/teacher.html',
                            student: '/pages/student.html'
                        };
                        window.location.replace(rolePages[data.user.role] || '/pages/student.html');
                        return;
                    }
                }
                
                localStorage.removeItem('user');
            } catch (error) {
                console.log('Session check error:', error);
                localStorage.removeItem('user');
            }
        }

        // التحقق من الجلسة عند تحميل الصفحة
        if (document.readyState === 'complete') {
            checkSession();
        } else {
            document.addEventListener('DOMContentLoaded', checkSession);
        }
    </script>
</body>
</html>
